<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#faf8f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lumière — Slideshow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #faf8f5;
  --surface:    #ffffff;
  --text:       #2a2520;
  --muted:      rgba(42,37,32,0.45);
  --accent:     #8c6d46;
  --accent-lt:  #c8a96e;
  --accent-dim: rgba(140,109,70,0.1);
  --border:     rgba(42,37,32,0.1);
  --border-mid: rgba(42,37,32,0.18);
  --shadow:     0 2px 24px rgba(42,37,32,0.08);
  --serif:      'Cormorant Garamond', Georgia, serif;
  --mono:       'DM Mono', monospace;
  /* safe-area insets for notched phones */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
}

html { height: 100%; height: -webkit-fill-available; }

body {
  min-height: 100vh;
  min-height: -webkit-fill-available;
  background: var(--bg);
  color: var(--text);
  font-family: var(--serif);
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: pan-y;
}

/* ═══════════════════════════════
   STAGE
═══════════════════════════════ */
.stage {
  position: fixed;
  inset: 0;
  background: var(--bg);
}

.slide {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
}
.slide.active { opacity: 1; pointer-events: all; }

.slide img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 8s linear;
  transform: scale(1.06);
  /* light: soften image so text reads against bright overlay */
  filter: brightness(0.88) saturate(0.9);
}
.slide.active img { transform: scale(1); }

/* light gradient overlays */
.slide::before {
  content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background:
    linear-gradient(to top,  rgba(250,248,245,0.92) 0%, rgba(250,248,245,0.2) 40%, transparent 65%),
    linear-gradient(to bottom, rgba(250,248,245,0.6) 0%, transparent 25%);
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: calc(var(--safe-top) + 1rem) calc(var(--safe-right) + 1.25rem) 1rem calc(var(--safe-left) + 1.25rem);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(250,248,245,0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: clamp(1.2rem, 4vw, 1.5rem);
  font-weight: 300; letter-spacing: 0.12em;
  color: var(--text); text-decoration: none;
  white-space: nowrap;
}
.logo em { font-style: italic; color: var(--accent); }

.header-right {
  display: flex; align-items: center;
  gap: clamp(0.6rem, 2vw, 1.4rem);
  flex-shrink: 0;
}

.hbtn {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted); background: none;
  border: none; cursor: pointer; transition: color 0.2s;
  padding: 0.4rem 0; min-height: 44px; display: flex; align-items: center;
}
.hbtn:hover, .hbtn:active { color: var(--accent); }
/* hide "Shuffle" text on very small screens, show icon */
.hbtn .label-full { display: inline; }
.hbtn .label-icon { display: none; }
@media (max-width: 360px) {
  .hbtn .label-full { display: none; }
  .hbtn .label-icon { display: inline; font-size: 0.9rem; }
}

.user-pill {
  display: none; align-items: center; gap: 0.5rem;
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent-dim); border: 1px solid rgba(140,109,70,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; color: var(--accent); flex-shrink: 0;
}
.user-name { display: none; }
@media (min-width: 480px) { .user-name { display: inline; } }

.logout-btn {
  font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); background: none;
  border: none; cursor: pointer; padding: 0.3rem 0; min-height: 44px;
  display: flex; align-items: center; transition: color 0.2s;
}
.logout-btn:hover { color: #c0514e; }

.upload-btn {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.14em;
  text-transform: uppercase; padding: 0.48rem 1rem;
  border: 1px solid rgba(140,109,70,0.5); color: var(--accent);
  background: transparent; cursor: pointer;
  transition: background 0.22s, color 0.22s;
  white-space: nowrap; min-height: 44px; display: flex; align-items: center;
}
.upload-btn:hover, .upload-btn:active { background: var(--accent); color: #fff; }

/* ═══════════════════════════════
   SLIDE INFO
═══════════════════════════════ */
.slide-info {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
  padding:
    1.5rem
    calc(var(--safe-right) + 1.25rem)
    calc(var(--safe-bottom) + 5.5rem)
    calc(var(--safe-left) + 1.25rem);
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 1rem;
}

@media (min-width: 600px) {
  .slide-info { padding-left: 2.5rem; padding-right: 2.5rem; padding-bottom: calc(var(--safe-bottom) + 5.5rem); }
}

.info-left { min-width: 0; }

.slide-eyebrow {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.5s 0.3s, transform 0.5s 0.3s;
}
.slide-title {
  font-size: clamp(1.6rem, 6vw, 4rem); font-weight: 300; font-style: italic;
  line-height: 1.1; color: var(--text);
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.6s 0.45s, transform 0.6s 0.45s;
  /* prevent overflow on small screens */
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.slide-meta {
  font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-top: 0.5rem;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.5s 0.6s, transform 0.5s 0.6s;
}
.slide.active .slide-eyebrow,
.slide.active .slide-title,
.slide.active .slide-meta { opacity: 1; transform: translateY(0); }

.slide-counter {
  font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); text-align: right; flex-shrink: 0;
  display: none;
}
@media (min-width: 480px) { .slide-counter { display: block; } }
.slide-counter strong {
  font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 300;
  color: rgba(42,37,32,0.1); font-family: var(--serif); font-style: italic;
  line-height: 1; display: block;
}

/* ═══════════════════════════════
   CONTROLS
═══════════════════════════════ */
.controls {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 1.4rem);
  left: 50%; transform: translateX(-50%);
  z-index: 30; display: flex; align-items: center; gap: 0.75rem;
}

.ctrl-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border-mid); background: rgba(250,248,245,0.75);
  color: var(--muted); cursor: pointer; font-size: 1rem;
  transition: all 0.2s; backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px); border-radius: 50%;
  box-shadow: var(--shadow);
}
.ctrl-btn:hover, .ctrl-btn:active { border-color: var(--accent); color: var(--accent); background: rgba(250,248,245,0.95); }

.play-btn {
  width: 54px; height: 54px; font-size: 1.1rem;
  border-color: rgba(140,109,70,0.35); color: var(--accent);
}
.play-btn:hover, .play-btn:active { background: var(--accent-dim); }

/* ═══════════════════════════════
   DOTS — bottom bar on mobile, right side on desktop
═══════════════════════════════ */
.dots {
  position: fixed; z-index: 30;
  display: flex; gap: 6px; align-items: center;
  /* mobile: horizontal strip above controls */
  bottom: calc(var(--safe-bottom) + 4.8rem);
  left: 50%; transform: translateX(-50%);
  flex-direction: row;
}
@media (min-width: 768px) {
  .dots {
    right: calc(var(--safe-right) + 1.8rem);
    top: 50%; bottom: auto;
    left: auto; transform: translateY(-50%);
    flex-direction: column;
  }
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(42,37,32,0.2); cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  /* bigger tap target */
  padding: 4px; background-clip: content-box;
  background-color: rgba(42,37,32,0.2);
}
.dot.active { background-color: var(--accent); transform: scale(1.3); }

/* ═══════════════════════════════
   PROGRESS BAR
═══════════════════════════════ */
.progress-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 2px; background: rgba(42,37,32,0.06); z-index: 40;
}
.progress-fill { height: 100%; background: var(--accent-lt); width: 0%; }

/* ═══════════════════════════════
   PANEL (shared)
═══════════════════════════════ */
.panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(250,248,245,0.97);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: calc(var(--safe-top) + 1rem) 1.5rem calc(var(--safe-bottom) + 1rem);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  overflow-y: auto;
}
.panel.open { opacity: 1; pointer-events: all; }

.panel-close {
  position: absolute; top: calc(var(--safe-top) + 1.2rem); right: calc(var(--safe-right) + 1.5rem);
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted); background: none;
  border: none; cursor: pointer; min-height: 44px; display: flex; align-items: center; gap: 0.3rem;
  transition: color 0.2s;
}
.panel-close:hover { color: var(--accent); }

.panel-title {
  font-size: clamp(2rem, 8vw, 3rem); font-weight: 300; font-style: italic;
  color: var(--text); margin-bottom: 0.3rem; text-align: center;
}
.panel-sub {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 2.5rem; text-align: center;
}

/* ═══════════════════════════════
   LOGIN BOX
═══════════════════════════════ */
.login-box {
  width: 100%; max-width: 380px;
  border: 1px solid var(--border-mid);
  padding: clamp(1.6rem, 5vw, 2.8rem) clamp(1.4rem, 5vw, 2.5rem);
  background: var(--surface);
  box-shadow: var(--shadow);
}

.login-field { margin-bottom: 1.4rem; }
.login-field label {
  display: block; font-family: var(--mono); font-size: 0.58rem;
  letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem;
}
.login-field input {
  width: 100%; background: transparent;
  border: none; border-bottom: 1px solid var(--border-mid);
  color: var(--text); font-family: var(--serif); font-size: 1.1rem; font-weight: 300;
  padding: 0.55rem 0; outline: none; transition: border-color 0.2s;
  /* prevent zoom on iOS */
  font-size: max(16px, 1.1rem);
}
.login-field input:focus { border-bottom-color: var(--accent); }
.login-field input::placeholder { color: rgba(42,37,32,0.2); font-style: italic; }

.login-submit {
  width: 100%; padding: 0.9rem;
  background: transparent; border: 1px solid var(--accent);
  color: var(--accent); font-family: var(--mono); font-size: 0.66rem;
  letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
  transition: background 0.22s, color 0.22s; margin-top: 0.6rem;
  min-height: 50px;
}
.login-submit:hover, .login-submit:active { background: var(--accent); color: #fff; }

.login-error {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: #c0514e; text-align: center;
  margin-top: 1rem; min-height: 1.2em;
}
.login-hint {
  font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(42,37,32,0.22);
  text-align: center; margin-top: 1.6rem;
}

/* ═══════════════════════════════
   DROP ZONE
═══════════════════════════════ */
.drop-zone {
  width: 100%; max-width: 440px;
  border: 1.5px dashed rgba(140,109,70,0.3);
  padding: clamp(2.5rem, 8vw, 4rem) 1.5rem;
  text-align: center; cursor: pointer; position: relative;
  transition: all 0.22s; background: var(--surface); box-shadow: var(--shadow);
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-dim); }
.drop-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-icon { font-size: 2rem; opacity: 0.2; margin-bottom: 0.9rem; }
.drop-zone p { font-size: 1rem; font-weight: 300; color: var(--muted); }
.drop-zone span {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent); display: block; margin-top: 0.5rem;
}
/* on touch devices, hide drag hint */
@media (hover: none) {
  .drop-zone p::after { content: ' — tap to browse'; }
}

/* ═══════════════════════════════
   TOUCH HINT
═══════════════════════════════ */
.touch-hint {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 4.4rem);
  right: calc(var(--safe-right) + 1.5rem);
  font-family: var(--mono); font-size: 0.5rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(42,37,32,0.2);
  z-index: 5; pointer-events: none; white-space: nowrap;
  writing-mode: vertical-rl; text-orientation: mixed;
}
@media (max-width: 767px) { .touch-hint { display: none; } }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#"><em>Lumière</em></a>
  <div class="header-right">
    <button class="hbtn" id="shuffleBtn" aria-label="Shuffle">
      <span class="label-full">Shuffle</span>
      <span class="label-icon">⇌</span>
    </button>
    <!-- guest: shows login gate -->
    <button class="upload-btn" id="openLoginBtn">+ Add Photos</button>
    <!-- logged-in: user pill + upload -->
    <div class="user-pill" id="userPill">
      <div class="avatar" id="userAvatar"></div>
      <span class="user-name" id="userNameLabel"></span>
      <button class="logout-btn" id="logoutBtn" aria-label="Sign out">Sign out</button>
    </div>
    <button class="upload-btn" id="openUploadBtn" style="display:none">+ Upload</button>
  </div>
</header>

<!-- STAGE -->
<div class="stage" id="stage" role="region" aria-label="Photo slideshow"></div>

<!-- DOTS -->
<div class="dots" id="dots" role="tablist" aria-label="Slide indicators"></div>

<!-- CONTROLS -->
<div class="controls" role="group" aria-label="Slideshow controls">
  <button class="ctrl-btn" id="prevBtn" aria-label="Previous slide">&#8592;</button>
  <button class="ctrl-btn play-btn" id="playBtn" aria-label="Play or pause slideshow">&#9654;</button>
  <button class="ctrl-btn" id="nextBtn" aria-label="Next slide">&#8594;</button>
</div>

<p class="touch-hint" aria-hidden="true">← arrow keys · p to pause</p>
<div class="progress-bar" role="progressbar"><div class="progress-fill" id="progressFill"></div></div>

<!-- LOGIN PANEL -->
<div class="panel" id="loginPanel" role="dialog" aria-modal="true" aria-label="Sign in">
  <button class="panel-close" id="closeLogin">&#215; Close</button>
  <p class="panel-title">Sign In</p>
  <p class="panel-sub">Only authorised users may upload</p>
  <div class="login-box">
    <div class="login-field">
      <label for="usernameInput">Username</label>
      <input type="text" id="usernameInput" placeholder="your name"
             autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
    </div>
    <div class="login-field">
      <label for="passwordInput">Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-submit" id="loginSubmit">Enter the gallery</button>
    <p class="login-error" id="loginError" role="alert" aria-live="polite"></p>
    <p class="login-hint">demo &nbsp;·&nbsp; admin / lumiere2024</p>
  </div>
</div>

<!-- UPLOAD PANEL -->
<div class="panel" id="uploadPanel" role="dialog" aria-modal="true" aria-label="Upload photos">
  <button class="panel-close" id="closeUpload">&#215; Close</button>
  <p class="panel-title">Add Photographs</p>
  <p class="panel-sub">Your photos will join the slideshow</p>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" multiple aria-label="Choose photos">
    <div class="drop-icon" aria-hidden="true">&#8679;</div>
    <p>Drop images here or click to browse</p>
    <span>jpg &nbsp;·&nbsp; png &nbsp;·&nbsp; webp &nbsp;·&nbsp; heic</span>
  </div>
</div>

<script>
/* ══════════════════════
   AUTH
══════════════════════ */
const USERS = { admin: 'lumiere2024', curator: 'photo1234' };
let currentUser = null;

function login(u, p) { if (USERS[u] && USERS[u] === p) { currentUser = u; return true; } return false; }
function logout()    { currentUser = null; updateAuthUI(); }

function updateAuthUI() {
  const in_ = !!currentUser;
  document.getElementById('openLoginBtn').style.display  = in_ ? 'none' : '';
  document.getElementById('openUploadBtn').style.display = in_ ? 'flex' : 'none';
  document.getElementById('userPill').style.display      = in_ ? 'flex' : 'none';
  if (in_) {
    document.getElementById('userAvatar').textContent    = currentUser[0].toUpperCase();
    document.getElementById('userNameLabel').textContent = currentUser;
  }
}

/* ── Login UI ── */
const loginPanel   = document.getElementById('loginPanel');
const loginError   = document.getElementById('loginError');
const usernameInput = document.getElementById('usernameInput');
const passwordInput = document.getElementById('passwordInput');

function openLogin() {
  pausePlay();
  loginError.textContent = ''; usernameInput.value = ''; passwordInput.value = '';
  loginPanel.classList.add('open');
  setTimeout(() => usernameInput.focus(), 300);
}

document.getElementById('openLoginBtn').onclick = openLogin;
document.getElementById('closeLogin').onclick   = () => loginPanel.classList.remove('open');
document.getElementById('loginSubmit').onclick  = attemptLogin;
passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') passwordInput.focus(); });

function attemptLogin() {
  const u = usernameInput.value.trim(), p = passwordInput.value;
  if (login(u, p)) {
    loginPanel.classList.remove('open');
    updateAuthUI();
    setTimeout(() => uploadPanel.classList.add('open'), 350);
  } else {
    loginError.textContent = 'Invalid credentials — please try again';
    passwordInput.value = ''; passwordInput.focus();
    passwordInput.style.borderBottomColor = '#c0514e';
    setTimeout(() => passwordInput.style.borderBottomColor = '', 1400);
  }
}

document.getElementById('logoutBtn').onclick = () => { logout(); uploadPanel.classList.remove('open'); };

/* ── Upload UI ── */
const uploadPanel = document.getElementById('uploadPanel');
document.getElementById('openUploadBtn').onclick = () => { pausePlay(); uploadPanel.classList.add('open'); };
document.getElementById('closeUpload').onclick   = () => uploadPanel.classList.remove('open');

function handleFiles(files) {
  let added = 0;
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const url  = URL.createObjectURL(file);
    const name = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    photos.push({ url, title: name, cat: 'Uploaded', meta: 'by ' + currentUser + ' · ' + new Date().toLocaleDateString() });
    added++;
  });
  if (added) { uploadPanel.classList.remove('open'); buildAll(); goTo(photos.length - 1); }
}

document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

/* ══════════════════════
   SLIDESHOW
══════════════════════ */
const DEMO = [
  { url:'https://picsum.photos/seed/sl1/1200/800', title:'Morning Light',   cat:'Portrait',     meta:'f/1.8 · 1/250s · ISO 200' },
  { url:'https://picsum.photos/seed/sl2/1200/800', title:'Open Horizon',    cat:'Landscape',    meta:'f/8 · 1/500s · ISO 100' },
  { url:'https://picsum.photos/seed/sl3/1200/800', title:'Urban Geometry',  cat:'Architecture', meta:'f/5.6 · 1/320s · ISO 400' },
  { url:'https://picsum.photos/seed/sl4/1200/800', title:'Dusk Palette',    cat:'Landscape',    meta:'f/11 · 1/60s · ISO 800' },
  { url:'https://picsum.photos/seed/sl5/1200/800', title:'Quiet Room',      cat:'Portrait',     meta:'f/2.0 · 1/200s · ISO 320' },
  { url:'https://picsum.photos/seed/sl6/1200/800', title:'Fractal Thought', cat:'Abstract',     meta:'f/2.8 · 1/400s · ISO 640' },
  { url:'https://picsum.photos/seed/sl7/1200/800', title:'Stone & Light',   cat:'Architecture', meta:'f/7.1 · 1/250s · ISO 200' },
  { url:'https://picsum.photos/seed/sl8/1200/800', title:'Valley Mist',     cat:'Landscape',    meta:'f/9 · 1/125s · ISO 100' },
  { url:'https://picsum.photos/seed/sl9/1200/800', title:'Soft Focus',      cat:'Portrait',     meta:'f/1.4 · 1/800s · ISO 160' },
];

let photos = [...DEMO], cur = 0, playing = false, timer = null;
const INTERVAL = 5000;
const stage        = document.getElementById('stage');
const dotsEl       = document.getElementById('dots');
const playBtn      = document.getElementById('playBtn');
const progressFill = document.getElementById('progressFill');

function buildAll() {
  stage.innerHTML = ''; dotsEl.innerHTML = '';
  photos.forEach((p, i) => {
    /* slide */
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === cur ? ' active' : '');
    slide.setAttribute('role', 'tabpanel');
    slide.setAttribute('aria-label', p.title);
    slide.innerHTML = `
      <img src="${p.url}" alt="${p.title}" loading="${i < 3 ? 'eager' : 'lazy'}">
      <div class="slide-info">
        <div class="info-left">
          <p class="slide-eyebrow">${p.cat}</p>
          <h2 class="slide-title">${p.title}</h2>
          <p class="slide-meta">${p.meta}</p>
        </div>
        <div class="slide-counter">
          <strong>${String(i+1).padStart(2,'0')}</strong>
          <span>/ ${String(photos.length).padStart(2,'0')}</span>
        </div>
      </div>`;
    /* tap anywhere on slide to advance (but not on info) */
    slide.addEventListener('click', e => {
      if (e.target.closest('.slide-info')) return;
      if (playing) pausePlay(); goNext();
    });
    stage.appendChild(slide);
    /* dot */
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === cur ? ' active' : '');
    dot.setAttribute('role', 'tab');
    dot.setAttribute('aria-label', 'Slide ' + (i+1));
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  });
}

const slideEls = () => stage.querySelectorAll('.slide');
const dotEls   = () => dotsEl.querySelectorAll('.dot');

function goTo(n) {
  slideEls()[cur].classList.remove('active'); dotEls()[cur].classList.remove('active');
  cur = ((n % photos.length) + photos.length) % photos.length;
  slideEls()[cur].classList.add('active');    dotEls()[cur].classList.add('active');
  resetProgress();
}
function goNext() { goTo(cur + 1); }
function goPrev() { goTo(cur - 1); }

function resetProgress() {
  progressFill.style.transition = 'none';
  progressFill.style.width = '0%';
  void progressFill.offsetWidth;
  if (playing) {
    progressFill.style.transition = `width ${INTERVAL}ms linear`;
    progressFill.style.width = '100%';
  }
}

function startPlay() {
  playing = true; playBtn.innerHTML = '&#9646;&#9646;'; playBtn.setAttribute('aria-label','Pause slideshow');
  resetProgress(); timer = setInterval(goNext, INTERVAL);
}
function pausePlay() {
  playing = false; playBtn.innerHTML = '&#9654;'; playBtn.setAttribute('aria-label','Play slideshow');
  clearInterval(timer); timer = null;
  progressFill.style.transition = 'none'; progressFill.style.width = '0%';
}

playBtn.onclick = () => playing ? pausePlay() : startPlay();
document.getElementById('prevBtn').onclick = () => { if (playing) pausePlay(); goPrev(); };
document.getElementById('nextBtn').onclick = () => { if (playing) pausePlay(); goNext(); };
document.getElementById('shuffleBtn').onclick = () => {
  const was = playing; if (playing) pausePlay();
  for (let i = photos.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [photos[i],photos[j]]=[photos[j],photos[i]]; }
  cur = 0; buildAll(); if (was) startPlay();
};

/* keyboard */
document.addEventListener('keydown', e => {
  if (loginPanel.classList.contains('open') || uploadPanel.classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (playing) pausePlay(); goNext(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); if (playing) pausePlay(); goPrev(); }
  if (e.key === 'p' || e.key === 'P') playing ? pausePlay() : startPlay();
  if (e.key === 'Escape') { loginPanel.classList.remove('open'); uploadPanel.classList.remove('open'); }
});

/* swipe */
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  if (loginPanel.classList.contains('open') || uploadPanel.classList.contains('open')) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = Math.abs(e.changedTouches[0].clientY - ty);
  if (Math.abs(dx) < 40 || dy > 60) return; /* ignore vertical scroll */
  if (playing) pausePlay();
  dx < 0 ? goNext() : goPrev();
});

/* close panels on backdrop tap */
loginPanel.addEventListener('click',  e => { if (e.target === loginPanel)  loginPanel.classList.remove('open'); });
uploadPanel.addEventListener('click', e => { if (e.target === uploadPanel) uploadPanel.classList.remove('open'); });

/* init */
updateAuthUI();
buildAll();
setTimeout(startPlay, 800);
</script>
</body>
</html>
